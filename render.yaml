services:
  - type: web
    name: bingery
    env: python
    buildCommand: "./build.sh"
    startCommand: "gunicorn app:app --workers 2 --timeout 120"
    healthCheckPath: /api/health
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.3"
      # Activates the config.py production boot guards (refuses dev secrets,
      # wildcard CORS, console email). Without this the web service would
      # silently run with insecure defaults.
      - key: FLASK_ENV
        value: production
      - key: AI_PROVIDER
        value: anthropic
      - key: ANTHROPIC_MODEL
        value: claude-sonnet-4-6
      - key: OLLAMA_MODEL
        value: gemma4:e4b
      - key: OLLAMA_BASE_URL
        value: http://localhost:11434
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: JWT_SECRET_KEY
        generateValue: true
      # Same-origin SPA, but the boot guard refuses a wildcard — set this to
      # the service's public URL.
      - key: CORS_ORIGINS
        value: https://bingery.onrender.com
      # Email verification: production refuses to boot on the console provider.
      - key: EMAIL_PROVIDER
        value: brevo
      - key: BREVO_API_KEY
        sync: false
      - key: EMAIL_FROM
        sync: false
      # Required by the admin sync endpoint (POST /api/anilist/sync,
      # /api/admin/sync-dub-sources).
      - key: ADMIN_SYNC_SECRET
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: bingery-db
          property: connectionString
  - type: cron
    name: bingery-anilist-resync
    env: python
    schedule: "0 3 * * 0"
    buildCommand: "pip install -r requirements.txt"
    startCommand: "python sync_anilist.py --full --since=$(date -u -d '7 days ago' +%Y-%m-%d)"
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.3"
      - key: AI_PROVIDER
        value: anthropic
      - key: ANTHROPIC_MODEL
        value: claude-sonnet-4-6
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: JWT_SECRET_KEY
        fromService:
          type: web
          name: bingery
          envVarKey: JWT_SECRET_KEY
      - key: DATABASE_URL
        fromDatabase:
          name: bingery-db
          property: connectionString
  - type: cron
    name: bingery-anilist-airing
    env: python
    schedule: "0 6 * * *"
    buildCommand: "pip install -r requirements.txt"
    startCommand: "python sync_anilist.py --airing"
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.3"
      - key: AI_PROVIDER
        value: anthropic
      - key: ANTHROPIC_MODEL
        value: claude-sonnet-4-6
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: JWT_SECRET_KEY
        fromService:
          type: web
          name: bingery
          envVarKey: JWT_SECRET_KEY
      - key: DATABASE_URL
        fromDatabase:
          name: bingery-db
          property: connectionString
  - type: cron
    name: bingery-dub-crunchyroll
    env: python
    schedule: "0 */6 * * *"
    buildCommand: "pip install -r requirements.txt"
    startCommand: "python sync_dub_crunchyroll.py"
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.3"
      - key: AI_PROVIDER
        value: anthropic
      - key: ANTHROPIC_MODEL
        value: claude-sonnet-4-6
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: JWT_SECRET_KEY
        fromService:
          type: web
          name: bingery
          envVarKey: JWT_SECRET_KEY
      - key: DATABASE_URL
        fromDatabase:
          name: bingery-db
          property: connectionString
  - type: cron
    name: bingery-dub-animeschedule
    env: python
    schedule: "0 4 * * *"
    buildCommand: "pip install -r requirements.txt"
    startCommand: "python sync_dub_animeschedule.py"
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.3"
      - key: AI_PROVIDER
        value: anthropic
      - key: ANTHROPIC_MODEL
        value: claude-sonnet-4-6
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: ANIMESCHEDULE_API_KEY
        sync: false
      - key: JWT_SECRET_KEY
        fromService:
          type: web
          name: bingery
          envVarKey: JWT_SECRET_KEY
      - key: DATABASE_URL
        fromDatabase:
          name: bingery-db
          property: connectionString
databases:
  - name: bingery-db
    plan: free
