name: Daily schedule refresh

# Refreshes the sub/dub data that powers /api/schedule.
#
# The Fly machine has 256MB RAM. A running Flask + gunicorn worker uses
# ~150MB; layering a sync subprocess on top OOM-kills the script. To stay
# on the free tier without bumping memory, we:
#   1. Stop the main app machine — releases the bingery_data volume.
#   2. Run a one-off machine with the same image and volume, executing
#      all four sync scripts back-to-back. With no Flask in the way, the
#      full 256MB is available for the syncs themselves.
#   3. Destroy the temp machine, restart the main app machine — auto-
#      reattaches the volume.
#
# Trade-off: the site is unreachable for ~5-10 min while the temp machine
# runs (Fly's auto-start can't fire because the volume is in use).
#
# Required GitHub secret: FLY_API_TOKEN (created with `fly tokens create deploy`).
# AnimeSchedule needs Fly secret ANIMESCHEDULE_API_KEY (inherited by the
# temp machine since it's in the same app).

on:
  schedule:
    # 06:00 UTC daily (~02:00 EDT / 23:00 PDT — off-peak everywhere).
    - cron: "0 6 * * *"
  workflow_dispatch:

concurrency:
  group: bingery-refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
      FLY_APP: bingery
      FLY_REGION: yyz
      FLY_VOLUME: bingery_data
    steps:
      - name: Install flyctl
        run: |
          curl -L https://fly.io/install.sh | sh
          echo "$HOME/.fly/bin" >> "$GITHUB_PATH"

      - name: Discover main app machine + image
        id: discover
        run: |
          MAIN_ID=$(fly machines list --app "$FLY_APP" --json | jq -r '.[0].id')
          if [ -z "$MAIN_ID" ] || [ "$MAIN_ID" = "null" ]; then
            echo "Could not find main app machine"; exit 1
          fi
          IMAGE_REF=$(fly machines list --app "$FLY_APP" --json \
            | jq -r --arg id "$MAIN_ID" '.[] | select(.id==$id) | .config.image')
          echo "main_id=$MAIN_ID" >> "$GITHUB_OUTPUT"
          echo "image_ref=$IMAGE_REF" >> "$GITHUB_OUTPUT"
          echo "Main machine: $MAIN_ID"
          echo "Image:        $IMAGE_REF"

      - name: Stop main app machine (releases the volume)
        run: |
          fly machine stop "${{ steps.discover.outputs.main_id }}" --app "$FLY_APP"
          for i in $(seq 1 60); do
            STATE=$(fly machine status "${{ steps.discover.outputs.main_id }}" --app "$FLY_APP" --json | jq -r .state)
            echo "main machine state: $STATE"
            if [ "$STATE" = "stopped" ]; then break; fi
            sleep 2
          done

      - name: Run all sync scripts on a temp machine
        id: sync
        # `fly machine run IMAGE -- CMD...` overrides the image's CMD but
        # keeps its ENTRYPOINT. We override the entrypoint to /bin/bash so
        # the args after `--` are interpreted as a shell command. The
        # script chains all four syncs with ; so a failure in one (e.g.
        # AniList rate-limit) doesn't skip the others.
        run: |
          SINCE_DATE=$(date -u -d '90 days ago' +%Y-%m-%d)
          SYNC_CMD="set +e; cd /app; echo '=== AniList ==='; python sync_anilist.py --since $SINCE_DATE; echo '=== Crunchyroll ==='; python sync_dub_crunchyroll.py; echo '=== AnimeSchedule ==='; python sync_dub_animeschedule.py; echo '=== Synthetic seed ==='; python seed_dub_schedule.py --overwrite --top 1500; echo '=== Done ==='"
          fly machine run "${{ steps.discover.outputs.image_ref }}" \
            --app "$FLY_APP" \
            --region "$FLY_REGION" \
            --volume "$FLY_VOLUME:/data" \
            --vm-memory 256 \
            --rm \
            --entrypoint /bin/bash \
            -- -c "$SYNC_CMD"
        continue-on-error: true

      - name: Restart main app machine
        if: always()
        run: |
          fly machine start "${{ steps.discover.outputs.main_id }}" --app "$FLY_APP"
          for i in $(seq 1 30); do
            STATE=$(fly machine status "${{ steps.discover.outputs.main_id }}" --app "$FLY_APP" --json | jq -r .state)
            echo "main machine state: $STATE"
            if [ "$STATE" = "started" ]; then break; fi
            sleep 3
          done
