name: Daily schedule refresh

# Refreshes the sub/dub data that powers /api/schedule:
#   1. AniList catalog sync (resumable, incremental — keeps Anime.status
#      and Episode.air_date_sub fresh, which is also what feeds the
#      "currently airing" cohort the synthetic dub seed uses).
#   2. Crunchyroll RSS dub ingest (real dub air dates for the shows CR
#      covers — currently a thin slice, ~11 rows in prod).
#   3. Synthetic dub seed reproject (--overwrite) — projects every sub
#      date on every currently-airing anime forward by 56 days as a
#      best-effort dub estimate, marked dub_source=synthetic_lag_8w so
#      the UI can flag them as "estimated".
#
# All three runs share one Fly machine (volume constraint) — we just
# `fly ssh console` into the long-running app machine. Fly auto-starts
# it if idle.
#
# Required GitHub secret: FLY_API_TOKEN (create with `fly tokens create deploy`).
# Each step uses continue-on-error so a transient AniList rate-limit or
# Crunchyroll RSS outage won't stop the synthetic reprojection at the
# end.

on:
  schedule:
    # 06:00 UTC daily (~02:00 EDT / 23:00 PDT — off-peak everywhere).
    - cron: "0 6 * * *"
  workflow_dispatch:

concurrency:
  group: bingery-refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Install flyctl
        run: |
          curl -L https://fly.io/install.sh | sh
          echo "$HOME/.fly/bin" >> "$GITHUB_PATH"

      - name: Wake the Fly machine
        # `fly ssh console` doesn't trigger auto_start; only HTTP traffic
        # via the edge proxy does. Hit /api/health, wait a moment, then
        # the SSH steps below have a running VM to land on.
        run: |
          curl -fsS --retry 5 --retry-delay 3 --max-time 60 https://bingery.fly.dev/api/health
          sleep 8

      - name: Sync AniList catalog (sub air dates + status)
        # --since refreshes anime that updated in the last 90 days, so
        # status fields (Currently Airing -> Finished, etc) and episode
        # times re-flow into the DB. --resume is a no-op once the catalog
        # is fully synced, so daily runs would otherwise change nothing.
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          SINCE_DATE=$(date -u -d '90 days ago' +%Y-%m-%d)
          fly ssh console --app bingery -C "bash -c 'cd /app && python sync_anilist.py --since ${SINCE_DATE}'"
        continue-on-error: true

      - name: Sync Crunchyroll RSS (real dub air dates)
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          fly ssh console --app bingery -C "bash -c 'cd /app && python sync_dub_crunchyroll.py'"
        continue-on-error: true

      - name: Sync AnimeSchedule.net (real dub air dates)
        # No-op until ANIMESCHEDULE_API_KEY is set as a Fly secret:
        #   fly secrets set ANIMESCHEDULE_API_KEY=<key>
        # Without a key the upstream returns 401 and the script exits non-zero;
        # continue-on-error swallows that so the seed reproject still runs.
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          fly ssh console --app bingery -C "bash -c 'cd /app && python sync_dub_animeschedule.py'"
        continue-on-error: true

      - name: Reproject synthetic dub seed
        if: always()
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          fly ssh console --app bingery -C "bash -c 'cd /app && python seed_dub_schedule.py --overwrite --top 1500'"
